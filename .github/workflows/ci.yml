name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  SOLUTION_PATH: "src/StackNucleus.sln"
  NUGET_SRC_URL: "https://api.nuget.org/v3/index.json"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration Release /p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test ${{ env.SOLUTION_PATH }} --no-build --configuration Release --collect:"XPlat Code Coverage"

      # - name: Publish code coverage (optional)
      #   if: success() && github.event_name != 'pull_request'
      #   uses: codecov/codecov-action@v3
      #   with:
      #     files: "**/coverage.cobertura.xml"
      #     fail_ci_if_error: true
